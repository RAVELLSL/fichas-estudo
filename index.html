<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trilha minimalista de fichas de estudo do curso de Informática e Tecnologia, organizada do básico ao avançado." />
  <title>Fichas de Estudo | Informática e Tecnologia</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --card-soft: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --muted-strong: #4b5563;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-soft: #eff6ff;
      --highlight: #fff3bf;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --shadow: 0 18px 46px rgba(17, 24, 39, 0.075);
      --shadow-soft: 0 8px 24px rgba(17, 24, 39, 0.055);
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 28rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 38%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    mark {
      border-radius: 6px;
      padding: 0 2px;
      background: var(--highlight);
      color: inherit;
    }

    .page {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    .hero {
      margin-bottom: 28px;
      text-align: center;
    }


    h1 {
      max-width: 860px;
      margin: 0 auto;
      font-size: clamp(2rem, 6vw, 3.75rem);
      line-height: 1;
      letter-spacing: -0.06em;
      text-wrap: balance;
    }

    .intro {
      max-width: 820px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: clamp(0.98rem, 2vw, 1.08rem);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 22px 0 18px;
      padding: 10px 0;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .search-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 10px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 16px;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search {
      width: 100%;
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0 16px 0 46px;
      background: var(--card-soft);
      color: var(--text);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .clear-btn {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 16px;
      background: #fff;
      color: var(--muted-strong);
      font-size: 0.88rem;
      font-weight: 750;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .clear-btn:hover,
    .clear-btn:focus {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-dark);
      outline: none;
    }

    .result-line {
      min-height: 22px;
      margin-top: 10px;
      padding-left: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .path {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .stage {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .stage:hover {
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .stage[open] {
      border-color: color-mix(in srgb, var(--accent) 32%, var(--line));
      box-shadow: var(--shadow);
    }

    .stage summary {
      list-style: none;
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      padding: 16px;
      background: #fff;
      user-select: none;
    }

    .stage summary::-webkit-details-marker {
      display: none;
    }

    .stage-number {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 850;
      letter-spacing: -0.03em;
    }

    .stage-title {
      min-width: 0;
    }

    .stage h2 {
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      line-height: 1.16;
      letter-spacing: -0.035em;
      text-wrap: balance;
    }

    .stage p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.91rem;
    }

    .stage-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--muted-strong);
      background: var(--card-soft);
      font-size: 0.78rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .chevron {
      width: 20px;
      height: 20px;
      color: var(--muted);
      transition: transform 0.18s ease;
    }

    .stage[open] .chevron {
      transform: rotate(180deg);
      color: var(--accent);
    }

    .stage-side {
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 2px;
    }

    .lessons {
      display: grid;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, var(--card-soft));
    }

    .lesson {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      transition: background 0.15s ease;
    }

    .lesson:last-child {
      border-bottom: 0;
    }

    .lesson:hover {
      background: #ffffff;
    }

    .lesson-order {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 750;
    }

    .lesson-title {
      display: block;
      color: var(--text);
      font-weight: 800;
      line-height: 1.24;
    }

    .lesson-note {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .open-link {
      grid-column: 2;
      width: fit-content;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      margin-top: 6px;
      padding: 0 13px;
      color: var(--accent-dark);
      background: #fff;
      font-size: 0.84rem;
      font-weight: 800;
      white-space: nowrap;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .open-link:hover,
    .open-link:focus {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
      outline: none;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius-xl);
      padding: 30px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      box-shadow: var(--shadow-soft);
    }

    .empty.visible {
      display: block;
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
    }

    @media (max-width: 900px) {
      .path {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 20px, var(--max));
        padding-top: 30px;
      }

      .toolbar {
        margin-top: 22px;
      }

      .search-panel {
        grid-template-columns: 1fr;
        border-radius: 20px;
      }

      .clear-btn {
        width: 100%;
      }

      .stage summary {
        grid-template-columns: 40px 1fr;
        gap: 12px;
        padding: 15px;
      }

      .stage-number {
        width: 40px;
        height: 40px;
        border-radius: 14px;
      }

      .stage-side {
        grid-column: 2;
        justify-content: space-between;
      }

      .lesson {
        grid-template-columns: 34px 1fr;
        padding: 15px;
      }

      .open-link {
        grid-column: 2;
        width: fit-content;
        margin-top: 4px;
      }
    }
  </style>
</head>

    const path = document.getElementById("path");
    const searchInput = document.getElementById("searchInput");
    const clearSearch = document.getElementById("clearSearch");
    const emptyState = document.getElementById("emptyState");

    function normalizeText(text) {
      return text
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getTokens(query) {
      return normalizeText(query)
        .split(" ")
        .filter((token) => token.length > 1);
    }

    function matchesSearch(content, tokens) {
      if (!tokens.length) return true;
      const normalized = normalizeText(content);
      return tokens.every((token) => normalized.includes(token));
    }

    function highlightText(text, tokens) {
      const escaped = escapeHtml(text);
      if (!tokens.length) return escaped;

      const validTokens = [...new Set(tokens)]
        .filter((token) => token.length > 1)
        .sort((a, b) => b.length - a.length);

      if (!validTokens.length) return escaped;

      let output = escaped;
      validTokens.forEach((token) => {
        const safeToken = token.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(`(${safeToken})`, "gi");
        output = output.replace(regex, "<mark>$1</mark>");
      });

      return output;
    }

    function lessonSearchContent(stage, lesson) {
      return `${stage.title} ${stage.description} ${stage.terms} ${lesson.title} ${lesson.note} ${lesson.terms}`;
    }

    function render() {
      const query = searchInput.value.trim();
      const tokens = getTokens(query);
      let visibleLessons = 0;
      let visibleStages = 0;

      const html = stages.map((stage, stageIndex) => {
        const stageMatches = matchesSearch(`${stage.title} ${stage.description} ${stage.terms}`, tokens);
        const filteredLessons = stage.lessons.filter((lesson) => {
          return stageMatches || matchesSearch(lessonSearchContent(stage, lesson), tokens);
        });

        if (!filteredLessons.length) return "";

        visibleStages += 1;
        visibleLessons += filteredLessons.length;

        const shouldOpen = tokens.length > 0 ? "open" : "";
        const lessonWord = filteredLessons.length === 1 ? "ficha" : "fichas";

        return `
          <details class="stage" ${shouldOpen}>
            <summary>
              <span class="stage-number">${stageIndex + 1}</span>
              <div class="stage-title">
                <h2>${highlightText(stage.title, tokens)}</h2>
                <p>${highlightText(stage.description, tokens)}</p>
              </div>
              <div class="stage-side">
                <span class="stage-count">${filteredLessons.length} ${lessonWord}</span>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
            </summary>
            <div class="lessons">
              ${filteredLessons.map((lesson, lessonIndex) => `
                <div class="lesson">
                  <span class="lesson-order">${String(lessonIndex + 1).padStart(2, "0")}</span>
                  <div>
                    <span class="lesson-title">${highlightText(lesson.title, tokens)}</span>
                    <span class="lesson-note">${highlightText(lesson.note, tokens)}</span>
                  </div>
                  <a class="open-link" href="${lesson.url}" target="_blank" rel="noopener noreferrer">Acessar</a>
                </div>
              `).join("")}
            </div>
          </details>
        `;
      }).join("");

      path.innerHTML = html;
      emptyState.classList.toggle("visible", visibleLessons === 0);

      if (!tokens.length) {
        resultLine.textContent = "";
      } else if (visibleLessons === 0) {
        resultLine.textContent = "Nenhum resultado encontrado.";
      } else {
        const lessonText = visibleLessons === 1 ? "ficha encontrada" : "fichas encontradas";
        const stageText = visibleStages === 1 ? "etapa" : "etapas";
        resultLine.textContent = `${visibleLessons} ${lessonText} em ${visibleStages} ${stageText}.`;
      }
    }

    searchInput.addEventListener("input", render);

    clearSearch.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
      render();
    });

    render();
  </script>
</body>
</html>
